<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tesla TPM Dashboard{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #000000;
      --surface:  #000000;
      --surface2: #0f0f0f;
      --border:   #222222;
      --text:     #ffffff;
      --muted:    #888888;
      --red:      #EE352E;
      /* status text colors referenced in inline styles across templates */
      --green-text:  #4ade80;
      --blue-text:   #60a5fa;
      --amber-text:  #fbbf24;
      --orange-text: #FF6319;
      --gray-text:   #888888;
    }

    body {
      background: #000000;
      color: #ffffff;
      font-family: "Helvetica Neue", Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
      min-height: 100vh;
    }

    p { font-size: 16px; font-weight: 500; }

    /* ── Nav ──────────────────────────────────────────── */
    nav {
      background: #000000;
      border-bottom: 1px solid #EE352E;
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-link {
      color: #ffffff;
      text-decoration: none;
      font-family: "Helvetica Neue", Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 700;
      transition: color 0.15s;
    }

    .nav-link:hover { color: #EE352E; }

    /* ── Layout ───────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2.5rem;
    }

    /* ── Cards ────────────────────────────────────────── */
    .card {
      background: #000000;
      border: 1px solid var(--border);
      padding: 1.75rem;
      margin-bottom: 1.75rem;
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      font-family: "Helvetica Neue", Helvetica, sans-serif;
      color: #ffffff;
      padding-bottom: 1rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Tables ───────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    th {
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      background: #000000;
    }

    td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      color: #ffffff;
      background: #000000;
      font-size: 15px;
      font-weight: 500;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td      { background: #0f0f0f; }

    /* ── Badges ───────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      white-space: nowrap;
      color: #ffffff;
    }

    .badge-released         { background: #00933C; }
    .badge-release_complete { background: #0039A6; }
    .badge-feature_complete { background: #0039A6; }
    .badge-in_development   { background: #FF6319; }
    .badge-planned          { background: #555555; }

    .badge-critical { background: #EE352E; }
    .badge-high     { background: #FF6319; }
    .badge-medium   { background: #FCCC0A; color: #000000; }
    .badge-low      { background: #555555; }

    /* ── Stat grid ────────────────────────────────────── */
    .stat-grid {
      display: grid;
      gap: 16px;
    }

    .stat-cell {
      background: #000000;
      padding: 1.5rem;
      border-bottom: 1px solid #222222;
    }

    .stat-value {
      font-size: 40px;
      font-weight: 700;
      font-family: "Helvetica Neue", Helvetica, sans-serif;
      color: #ffffff;
      display: block;
      line-height: 1.1;
    }

    .stat-label {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Forms ────────────────────────────────────────── */
    input[type="date"],
    input[type="text"] {
      background: #000000;
      border: 1px solid #444444;
      color: #ffffff;
      padding: 10px 14px;
      font-family: "Helvetica Neue", Helvetica, sans-serif;
      font-size: 14px;
      font-weight: 500;
      outline: none;
      width: 100%;
      -webkit-appearance: none;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.5);
      cursor: pointer;
    }

    input:focus { border-color: #EE352E; }

    .btn {
      display: inline-block;
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 12px 24px;
      font-family: "Helvetica Neue", Helvetica, sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      width: 100%;
      text-align: center;
    }

    .btn:hover { background: #EE352E; color: #ffffff; }

    /* ── Progress bar ─────────────────────────────────── */
    .progress {
      height: 3px;
      background: var(--border);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #EE352E;
    }

    /* ── Section sublabels ───────────────────────────── */
    .sublabel {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Typography helpers ───────────────────────────── */
    .red   { color: #EE352E; }
    .muted { color: var(--muted); font-size: 14px; font-weight: 500; }
    code   { font-family: "Helvetica Neue", Helvetica, sans-serif; }

    a { color: #ffffff; text-decoration: none; }
    a:hover { color: #EE352E; }

    .page-crumb {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .page-crumb a { color: var(--muted); }
    .page-crumb a:hover { color: #EE352E; }

    .page-title {
      font-size: 40px;
      font-weight: 700;
      font-family: "Helvetica Neue", Helvetica, sans-serif;
      color: #ffffff;
      line-height: 1.1;
    }

    .page-sub {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 8px;
    }

    .alert {
      background: #1a0000;
      border: 1px solid #EE352E;
      color: #ffffff;
      padding: 12px 16px;
      margin-bottom: 1.5rem;
      font-size: 13px;
    }

    /* ── Pipeline dots ───────────────────────────────── */
    .pipeline-dot:hover {
      transform: scale(1.4);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.15);
    }

    @media (max-width: 700px) {
      .container { padding: 1.5rem 1rem; }
      .page-title { font-size: 28px; }
      nav { padding: 0 1rem; }
      .nav-links { gap: 1.25rem; }
      .nav-link { font-size: 14px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/snapshot" class="nav-link">Snapshot</a>
    <a href="/compare" class="nav-link">Compare</a>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
